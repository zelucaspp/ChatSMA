      function createGradient(baseColor) {
        const r = parseInt(baseColor.slice(1, 3), 16);
        const g = parseInt(baseColor.slice(3, 5), 16);
        const b = parseInt(baseColor.slice(5, 7), 16);
        const lighterColor = `#${Math.min(255, r + 30).toString(16).padStart(2, '0')}${Math.min(255, g + 30).toString(16).padStart(2, '0')}${Math.min(255, b + 30).toString(16).padStart(2, '0')}`;
        const darkerColor = `#${Math.max(0, r - 30).toString(16).padStart(2, '0')}${Math.max(0, g - 30).toString(16).padStart(2, '0')}${Math.max(0, b - 30).toString(16).padStart(2, '0')}`;
        return `linear-gradient(135deg, ${lighterColor}, ${baseColor}, ${darkerColor})`;

        function createCustomStore() {
  return window.WebChat.createStore(
    {},
    ({ dispatch }) => next => action => {

      // inicia conversa (seu código original)
      if (action.type === "DIRECT_LINE/CONNECT_FULFILLED") {
        dispatch({
          type: "DIRECT_LINE/POST_ACTIVITY",
          meta: { method: "keyboard" },
          payload: {
            activity: {
              channelData: { postBack: true },
              name: "startConversation",
              type: "event",
            },
          },
        });
      }

      // quando usuário envia mensagem
      if (action.type === "DIRECT_LINE/POST_ACTIVITY") {
        setTimeout(() => {

          const transcript = document.querySelector(".webchat__basic-transcript");

          if (transcript && !document.getElementById("typingLoader")) {

            const loader = document.createElement("div");
            loader.id = "typingLoader";
            loader.className = "webchat__typing-indicator";
            loader.innerHTML = "<span></span><span></span><span></span>";

            transcript.appendChild(loader);
          }

        }, 200);
      }

      // quando bot responde remove loader
      if (action.type === "DIRECT_LINE/INCOMING_ACTIVITY") {

        if (action.payload.activity.from.role === "bot") {

          const loader = document.getElementById("typingLoader");

          if (loader) loader.remove();
        }
      }

      return next(action);
    }
  );
}

      async function restartConversation() {
        try {
          if (!directLineUrl) {
            console.error("DirectLine URL not initialized");
            return;
          }

          const response = await fetch(tokenEndpoint);
          const conversationInfo = await response.json();

          if (!conversationInfo.token) {
            throw new Error("Failed to get conversation token");
          }

          const newDirectLine = window.WebChat.createDirectLine({
            domain: `${directLineUrl}v3/directline`,
            token: conversationInfo.token,
          });

          const webchatElement = document.getElementById("webchat");
          
          webChatInstance = window.WebChat.renderWebChat(
          {
            directLine,
            styleOptions,
            store: createCustomStore(),
            activityMiddleware
          },
          document.getElementById("webchat")
          );
          

          const activityMiddleware = () => next => card => {
          if (card.activity.type === 'typing') {
            return () => {
              const typing = document.createElement('div');
              typing.className = 'webchat__typing-indicator';
              typing.innerHTML = '<span></span><span></span><span></span>';
              return typing;
            };
          }

          return next(card);
        };


          
          webChatInstance = window.WebChat.renderWebChat(
            {
              directLine: newDirectLine,
              styleOptions,
              store: createCustomStore(),
              activityMiddleware
            },
            webchatElement
          );
          
        } catch (err) {
          console.error("Failed to restart conversation:", err);
        }
      }

      const activityMiddleware = () => next => card => {

      if (card.activity.type === "typing") {
        return () => {
          const typing = document.createElement("div");
          typing.className = "webchat__typing-indicator";
          typing.innerHTML = "<span></span><span></span><span></span>";
          return typing;
        };
      }

      return next(card);
      };


      async function initializeChat() {
        try {
          const response = await fetch(regionalChannelSettingsURL);
          const data = await response.json();
          directLineUrl = data.channelUrlsById.directline;

          if (!directLineUrl) {
            throw new Error("Failed to get DirectLine URL");
          }

          const conversationResponse = await fetch(tokenEndpoint);
          const conversationInfo = await conversationResponse.json();

          if (!conversationInfo.token) {
            throw new Error("Failed to get conversation token");
          }

          const directLine = window.WebChat.createDirectLine({
            domain: `${directLineUrl}v3/directline`,
            token: conversationInfo.token,
          });

          webChatInstance = window.WebChat.renderWebChat(
            {
              directLine,
              styleOptions,
              store: createCustomStore(),
              activityMiddleware
            },
            document.getElementById("webchat")
          );
        } catch (err) {
          console.error("Failed to initialize chat:", err);
        }
      }

      initializeChat();

        </button>
        <button
          class="icon-button"
          id="close-button"
          onclick="hideChat()"
          aria-label="Close Chat"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>
    <div id="webchat" role="main"></div>
  </div>



</body>
</html>
